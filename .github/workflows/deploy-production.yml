name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: supportshelf-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          extensions: bcmath, curl, mbstring, pdo_sqlite, pcntl, sockets, sqlite3, xml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Prepare environment
        run: |
          cp .env.example .env
          mkdir -p database
          touch database/database.sqlite
          php -r "file_put_contents('.env', preg_replace('/^APP_KEY=.*$/m', 'APP_KEY=base64:'.base64_encode(random_bytes(32)), file_get_contents('.env')));"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install frontend dependencies
        run: npm ci

      - name: Finalize Laravel environment
        run: php artisan key:generate --force

      - name: Run test suite
        run: php artisan test

      - name: Build frontend assets
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - verify

    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PROD_PORT" -H "$PROD_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" '
            set -e
            cd /opt/supportshelf
            git fetch origin
            git reset --hard origin/main
            chmod +x scripts/deploy-production.sh
            APP_DIR=/opt/supportshelf \
            ENV_FILE=.env.production \
            COMPOSE_FILE=compose.prod.yaml \
            HEALTHCHECK_URL=http://127.0.0.1:18080/api/support/status \
            bash scripts/deploy-production.sh
          '
