services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ROLE: web
      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_started
    ports:
      - "127.0.0.1:18080:80"
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage/app
    networks:
      default:
      captain-overlay-network:
        aliases:
          - supportshelf-web
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ROLE: worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage/app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ROLE: scheduler
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      weaviate:
        condition: service_started
    restart: unless-stopped
    volumes:
      - app_storage:/var/www/html/storage/app

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      APP_ROLE: reverb
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:18081:8080"
    restart: unless-stopped
    networks:
      default:
      captain-overlay-network:
        aliases:
          - supportshelf-reverb

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - yes
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.36.6
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --scheme
      - http
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      CLUSTER_HOSTNAME: node1
    restart: unless-stopped
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  app_storage:
  mysql_data:
  redis_data:
  weaviate_data:

networks:
  captain-overlay-network:
    external: true
